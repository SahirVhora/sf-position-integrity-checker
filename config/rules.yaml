# SF Position Integrity Checker — Rules Configuration
# Each rule defines one alignment check run against every position.
# You can disable rules, change severity, or add custom rules.
#
# Rule types:
#   scalar_match   — position field must match a field on a referenced foundation record
#   set_membership — position field must be a member of a set from a junction lookup
#   not_null       — position field must be non-blank when a condition is met
#
# fire_when_lookup_field_not_null (scalar_match only):
#   When true, the rule fires whenever the looked-up field is populated on the
#   foundation record — even if the position field is blank. This is used to
#   catch cases where the foundation record defines a value but the position omits it.

rules:

  - id: CHK-09
    enabled: true
    description: "Sub Department must belong to the Position's Department"
    category: "Hierarchy Alignment"
    severity: CRITICAL
    type: scalar_match
    position_field: cust_subDepartment
    lookup_key: sub_departments
    lookup_field: cust_Department
    compare_to_position_field: department

  - id: CHK-10
    enabled: true
    description: "Department must belong to the Position's Division"
    category: "Hierarchy Alignment"
    severity: CRITICAL
    type: scalar_match
    position_field: department
    lookup_key: departments
    lookup_field: cust_Division
    compare_to_position_field: division

  - id: CHK-11
    enabled: true
    description: "Division must be linked to the Position's Business Unit"
    category: "Hierarchy Alignment"
    severity: CRITICAL
    type: set_membership
    position_field: division
    lookup_key: divisions
    junction_lookup_key: div_to_bus
    compare_to_position_field: businessUnit

  - id: CHK-12
    enabled: true
    description: "Business Unit must be linked to the Position's Legal Entity"
    category: "Hierarchy Alignment"
    severity: CRITICAL
    type: set_membership
    position_field: businessUnit
    lookup_key: business_units
    junction_lookup_key: bu_to_les
    compare_to_position_field: company

  - id: CHK-13
    enabled: true
    description: "Cost Centre must be linked to the Position's Business Unit"
    category: "Cost Centre Alignment"
    severity: CRITICAL
    type: set_membership
    position_field: costCenter
    lookup_key: cost_centers
    junction_lookup_key: cc_to_bus
    compare_to_position_field: businessUnit

  - id: CHK-15
    enabled: true
    description: "Job Code Job Family must match Position's Job Family"
    category: "Job Code"
    severity: HIGH
    type: scalar_match
    position_field: jobCode
    lookup_key: job_codes
    lookup_field: jobFunction
    compare_to_position_field: cust_JobFunction

  - id: CHK-16
    enabled: true
    description: "Job Code Sub Family must match Position's Job Sub Family"
    category: "Job Code"
    severity: HIGH
    type: scalar_match
    position_field: jobCode
    lookup_key: job_codes
    lookup_field: cust_jobsubfunction
    compare_to_position_field: cust_jobSubFunction

  - id: CHK-17
    enabled: true
    description: "Job Code Grade must match Position's Global Job Level"
    category: "Job Code"
    severity: HIGH
    type: scalar_match
    position_field: jobCode
    lookup_key: job_codes
    lookup_field: grade
    compare_to_position_field: cust_GlobalJobLevel
    fire_when_lookup_field_not_null: true

  - id: CHK-18
    enabled: true
    description: "Job Code Career Path must match Position's Career Path"
    category: "Job Code"
    severity: HIGH
    type: scalar_match
    position_field: jobCode
    lookup_key: job_codes
    lookup_field: cust_careerPath
    compare_to_position_field: cust_CareerPath
